<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Financeiro</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/buttons.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/utils.css" />
</head>
<body>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast-msg" aria-live="polite"></div>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">&#9783;</span>
        <span class="brand-name">Meu Financeiro</span>
      </div>
      <span id="header-subtitle" class="header-subtitle">Dashboard</span>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main" class="main-content">

    <!-- =================== DASHBOARD =================== -->
    <section id="page-dashboard" class="page active">

      <!-- hero card -->
      <div class="hero-card">
        <p class="hero-label">Total gasto este mês</p>
        <h1 id="dash-total" class="hero-amount">R$ 0,00</h1>
        <p id="dash-period" class="hero-period"></p>
      </div>

      <!-- category breakdown -->
      <div class="section-header">
        <h2 class="section-title">Por categoria</h2>
        <button class="btn-link" id="dash-see-all" data-page="despesas">Ver todas</button>
      </div>
      <div id="dash-resumo" class="resumo-list">
        <p class="empty-state">Carregando&hellip;</p>
      </div>

      <!-- recent expenses -->
      <div class="section-header mt-3">
        <h2 class="section-title">Recentes</h2>
      </div>
      <div id="dash-recent" class="cards-list">
        <p class="empty-state">Carregando&hellip;</p>
      </div>

    </section>

    <!-- =================== DESPESAS =================== -->
    <section id="page-despesas" class="page">

      <!-- period filter -->
      <div class="filter-card">
        <h3 class="filter-title">Filtrar por per&iacute;odo</h3>
        <div class="filter-row">
          <div class="filter-group">
            <label for="f-inicio">De</label>
            <input type="date" id="f-inicio" class="input-field" />
          </div>
          <div class="filter-group">
            <label for="f-fim">At&eacute;</label>
            <input type="date" id="f-fim" class="input-field" />
          </div>
        </div>
        <div class="filter-actions">
          <button id="btn-filtrar" class="btn-primary">Filtrar</button>
          <button id="btn-limpar" class="btn-ghost">Limpar</button>
        </div>
      </div>

      <div class="section-header">
        <h2 class="section-title">Despesas</h2>
        <span id="despesas-count" class="badge-count">0</span>
      </div>
      <div id="despesas-list" class="cards-list">
        <p class="empty-state">Carregando&hellip;</p>
      </div>

    </section>

    <!-- =================== CATEGORIAS =================== -->
    <section id="page-categorias" class="page">

      <!-- add form -->
      <div class="add-card">
        <h3 class="add-card-title">Nova Categoria</h3>
        <div class="form-group">
          <label for="cat-nome">Nome *</label>
          <input type="text" id="cat-nome" class="input-field" placeholder="Ex: Alimenta&ccedil;&atilde;o" maxlength="80" />
        </div>
        <div class="form-group">
          <label for="cat-desc">Descri&ccedil;&atilde;o</label>
          <input type="text" id="cat-desc" class="input-field" placeholder="Opcional" maxlength="160" />
        </div>
        <button id="btn-add-cat" class="btn-primary w-100">Adicionar</button>
      </div>

      <div class="section-header mt-3">
        <h2 class="section-title">Categorias</h2>
        <span id="cat-count" class="badge-count">0</span>
      </div>
      <div id="cat-list" class="cards-list">
        <p class="empty-state">Carregando&hellip;</p>
      </div>

    </section>

    <!-- =================== NOVA DESPESA =================== -->
    <section id="page-nova" class="page">

      <div class="form-card">
        <h2 class="form-card-title">Nova Despesa</h2>

        <div class="form-group">
          <label for="desp-desc">Descri&ccedil;&atilde;o *</label>
          <input type="text" id="desp-desc" class="input-field" placeholder="Ex: Almo&ccedil;o" maxlength="200" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="desp-valor">Valor (R$) *</label>
            <input type="number" id="desp-valor" class="input-field" placeholder="0,00" min="0.01" step="0.01" />
          </div>
          <div class="form-group">
            <label for="desp-data">Data *</label>
            <input type="date" id="desp-data" class="input-field" />
          </div>
        </div>

        <div class="form-group">
          <label for="desp-cat">Categoria *</label>
          <select id="desp-cat" class="input-field">
            <option value="">Selecione&hellip;</option>
          </select>
        </div>

        <button id="btn-add-desp" class="btn-primary w-100 mt-2">Registrar Despesa</button>
      </div>

    </section>

  </main>

  <!-- ===== MODAL DETALHES ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" id="modal-close">&times;</button>
      <h3 class="modal-title">Detalhes da Despesa</h3>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>Visão Geral</span>
    </button>
    <button class="nav-btn" data-page="despesas">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      <span>Despesas</span>
    </button>
    <button class="nav-btn nav-btn-add" data-page="nova">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>Adicionar</span>
    </button>
    <button class="nav-btn" data-page="categorias">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
        <line x1="7" y1="7" x2="7.01" y2="7"/>
      </svg>
      <span>Categorias</span>
    </button>
  </nav>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/despesas.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/categorias.js"></script>
  <script src="js/nova.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
